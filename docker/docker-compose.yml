version: "3.8"

# з”џдє§/йў„еЏ‘пјљAPI + RedisпјЊдёЌжЊ‚иЅЅжєђз Ѓ
services:
  api:
    image: yunshu-api:latest
    container_name: yunshu-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_SERVICE_ENV=${API_SERVICE_ENV:-prod}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_SCHEDULER=${ENABLE_SCHEDULER:-1}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}
      - USE_ORACLE_THICK_MODE=${USE_ORACLE_THICK_MODE:-1}
      - LD_LIBRARY_PATH=/opt/oracle/instantclient
      - MYSQL_HOST=${MYSQL_HOST:-host.docker.internal}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DB=${MYSQL_DB:-yunshu_api_data_platform}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_ENABLE=${REDIS_ENABLE:-true}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - /app/yunshu-api/lib/instantclient_19_30:/opt/oracle/instantclient
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yunshu-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
