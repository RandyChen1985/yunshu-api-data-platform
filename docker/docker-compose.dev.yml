version: "3.8"

# 本地开发：挂载源码热更新 + 内置 Redis
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: yunshu-api:dev
    container_name: yunshu-api-dev
    ports:
      - "8000:8000"
    volumes:
      - ../:/app
    env_file:
      - ../.env
    environment:
      - API_SERVICE_ENV=dev
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - ENABLE_SCHEDULER=1
      - WEB_CONCURRENCY=1
      - MYSQL_HOST=${MYSQL_HOST:-host.docker.internal}
      - REDIS_HOST=redis
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yunshu-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped
