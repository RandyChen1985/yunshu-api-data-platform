<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景 -->
  <rect width="100" height="100" fill="#2563eb" rx="20"/>
  
  <!-- 云枢标志 - 抽象的数据流 -->
  <g fill="white" opacity="0.9">
    <!-- 上方云 -->
    <path d="M30,25 Q20,25 20,35 Q20,40 25,42 Q23,45 25,48 Q28,52 35,52 L55,52 Q62,52 65,48 Q67,45 65,42 Q70,40 70,35 Q70,25 60,25 Q58,20 50,20 Q42,20 40,25 Z"/>
    
    <!-- 数据流线条 -->
    <line x1="45" y1="52" x2="45" y2="65" stroke="white" stroke-width="2.5" opacity="0.8"/>
    <line x1="45" y1="65" x2="30" y2="75" stroke="white" stroke-width="2.5" opacity="0.8"/>
    <line x1="45" y1="65" x2="60" y2="75" stroke="white" stroke-width="2.5" opacity="0.8"/>
    
    <!-- 底部节点 -->
    <circle cx="30" cy="75" r="6" fill="white"/>
    <circle cx="60" cy="75" r="6" fill="white"/>
    <circle cx="45" cy="80" r="4" fill="white" opacity="0.6"/>
  </g>
  
  <!-- 文字 "云" 的简化 -->
  <text x="50" y="92" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle" opacity="0.7">云枢</text>
</svg>
